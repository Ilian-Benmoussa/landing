<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Le Wagon - Learn to Code</title>
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- BANNER / HERO SECTION -->
    <div class="banner">
        <div class="container">
            <h1>Change your life, learn to code</h1>
            <h2>Le Wagon brings tech skills to creative people</h2>
            <a href="http://lewagon.com" target="_blank" class="btn-primary">Discover Le Wagon</a>
        </div>
    </div>

    <!-- CARDS GRID SECTION -->
    <div class="section">
        <div class="container">
            <h2>Our Bootcamps</h2>

            <div class="cards">

                <div class="card">
                    <img src="images/paris.png" alt="Le Wagon Paris">
                    <h3>Paris</h3>
                    <p>Learn code in the City of Light</p>
                </div>

                <div class="card">
                    <img src="images/london.png" alt="Le Wagon London">
                    <h3>London</h3>
                    <p>Join our vibrant community</p>
                </div>

                <div class="card">
                    <img src="images/tokyo.png" alt="Le Wagon Tokyo">
                    <h3>Tokyo</h3>
                    <p>Discover coding in Asia</p>
                </div>

                <div class="card">
                    <img src="images/barcelona.png" alt="Le Wagon Barcelona">
                    <h3>Barcelona</h3>
                    <p>Learn in a Mediterranean atmosphere</p>
                </div>

            </div>

        </div>
    </div>

</body>

</html>
